name: Build NextBSD Base (curated)
on:
  repository_dispatch:
    types: [toolchain-updated]
  pull_request:
    # Validate the curated base build (both arches) on PRs touching srclist or
    # the workflow. PR runs never cascade — the downstream nextbsd ISO dispatch
    # is gated on github.ref_name == 'main', which is "<PR#>/merge" on a PR.
    paths: ['srclist.txt', '.github/workflows/build.yml']
  workflow_dispatch:
    inputs:
      fbsd_sha:
        description: 'Pinned FreeBSD SHA for the toolchain image tag (blank = latest)'
        required: false
        default: ''

env:
  FREEBSD_BRANCH: releng/15.0
  # Build prereqs only (these install NOTHING to the base): no compiler in base,
  # no tests/lib32. The base gets ONLY the dirs in srclist.txt via curated install.
  WORLD_FLAGS: WITHOUT_TOOLCHAIN=yes WITHOUT_TESTS=yes WITHOUT_LIB32=yes WITHOUT_MAN=yes

jobs:
  base:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
          - target: arm64
            target_arch: aarch64
    container:
      # Per-arch toolchain image (the same one the kernel/modules builds use).
      # Both arches cross-build on the x86_64 runner — clang cross-compiles, no
      # emulation. The toolchain repo publishes both amd64-* and arm64-* tags.
      image: ghcr.io/nextbsd-redux/nextbsd-kernel-toolchain:${{ matrix.target }}-${{ (github.event.client_payload.fbsd_sha || inputs.fbsd_sha) && format('fbsd-{0}', github.event.client_payload.fbsd_sha || inputs.fbsd_sha) || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-base-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            ccache-base-${{ matrix.target }}-

      - name: ccache reset counters
        run: |
          ccache -o max_size=8G
          ccache -z
          ccache -s

      # Stage the cross sysroot: world toolchain (build-tools + cross-tools, minus
      # clang via --cross-bindir) + headers. Installs NOTHING to the base.
      - name: Bootstrap sysroot (toolchain + includes)
        run: |
          cd /usr/src
          ./tools/build/make.py --cross-bindir="${CCACHE_CROSS_BINDIR}" \
            TARGET=${{ matrix.target }} TARGET_ARCH=${{ matrix.target_arch }} ${WORLD_FLAGS} \
            toolchain -j"$(nproc)"
          ./tools/build/make.py --cross-bindir="${CCACHE_CROSS_BINDIR}" \
            TARGET=${{ matrix.target }} TARGET_ARCH=${{ matrix.target_arch }} ${WORLD_FLAGS} \
            _includes -j"$(nproc)"

      - name: ccache stats (after bootstrap)
        run: ccache -s

      # Curated per-directory build into /stage, in the cross buildenv. ONLY the
      # dirs in srclist.txt are built + installed — nothing else touches the base.
      - name: Build curated base into /stage
        run: |
          cd /usr/src
          mkdir -p /stage
          grep -vE '^[[:space:]]*(#|$)' "$GITHUB_WORKSPACE/srclist.txt" > /tmp/srclist
          cat > /tmp/curated.sh <<'EOS'
          set -e
          # buildenv pre-bakes INSTALL/METALOG with an EMPTY DESTDIR. We must
          # KEEP the -N (FreeBSD user/group db for name resolution on Linux) and
          # -U (metalog mode — no real chown, which Linux can't do: no `wheel`),
          # and only fix the DESTDIR. So set INSTALL/METALOG explicitly with /stage.
          export DESTDIR=/stage
          export METALOG=/stage/METALOG
          export INSTALL="install -N /usr/src/etc -U -M /stage/METALOG -D /stage"
          # Lever B (#278): add /usr/local/lib to rtld-elf's compiled-in default
          # search path so ports/pkg binaries resolve their libs with NO hints
          # file (robust on the live union + installed UFS; covers setuid too).
          # Via make.conf so CFLAGS+= APPENDS to rtld's Makefile flags (a
          # command-line `make CFLAGS+=` overrides them and drops rtld's -I ->
          # "debug.h not found"). printf %s keeps the \" literal (C string).
          printf '%s\n' \
            '.if ${.CURDIR:M*/libexec/rtld-elf}' \
            'CFLAGS+= -DSTANDARD_LIBRARY_PATH=\"/lib:/usr/lib:/usr/lib/system:/usr/local/lib\"' \
            '.endif' >> /etc/make.conf
          # Create ONLY the base-userland target dirs the curated installs need.
          # NO distrib-dirs, NO FreeBSD mtree, NO /etc, NO /var — nextbsd owns those.
          # (We normally rely on mtree to pre-create the hierarchy; here we
          # enumerate just the subdirs our srclist entries install into, since
          # `install file dir/` requires dir to pre-exist.)
          mkdir -p /stage/bin /stage/sbin /stage/lib /stage/libexec \
                   /stage/usr/bin /stage/usr/sbin /stage/usr/lib /stage/usr/libexec \
                   /stage/usr/include /stage/usr/share /stage/usr/libdata/pkgconfig \
                   /stage/usr/lib/engines-3 /stage/usr/lib/ossl-modules \
                   /stage/usr/lib/libxo/encoder \
                   /stage/usr/share/zoneinfo /stage/usr/share/vt/fonts \
                   /stage/usr/share/vt/keymaps /stage/usr/share/syscons/keymaps \
                   /stage/usr/share/certs/trusted /stage/usr/share/certs/untrusted \
                   /stage/usr/share/certs/blocklisted /stage/etc/ssl \
                   /stage/boot /stage/boot/lua /stage/boot/defaults /stage/boot/efi
          # NB: /stage/etc/ssl (openssl.cnf + cert.pem) is created so the
          # openssl/caroot installs succeed, then STRIPPED in the Pack step
          # (nextbsd owns /etc; it regenerates cert.pem from /usr/share/certs).
          # MK_INCLUDES=no per dir (per-dir header installs hit nonstandard
          # contrib /usr/include subdirs). Headers are staged in bulk below.
          # The MIT krb5 libs (krb5/lib/*) can't be built per-dir without first
          # staging their build prerequisites OUTSIDE /stage: the compile_et
          # build-tool + the et awk scripts must be on PATH / in /usr/share/et
          # (the ephemeral CI container root, DESTDIR=/), and the generated
          # headers (krb5.h/com_err.h/gssapi.h) must be in the cross sysroot
          # include dir (DESTDIR=$SYSROOT) the lib compiles read. FreeBSD 15.0
          # defaults MK_KERBEROS=no, hence the explicit WITH flags on krb5/*.
          SYSROOT="/usr/obj/usr/src/${{ matrix.target }}.${{ matrix.target_arch }}/tmp"
          KRBFLAGS="MK_KERBEROS=yes MK_KERBEROS_SUPPORT=yes MK_MITKRB5=yes MK_GSSAPI=yes"
          # krb5/include installs into these header subdirs and install(1) needs
          # them to pre-exist — in /stage (the base) and in the sysroot (staged
          # build headers). /stage/usr/lib/krb5 is the gssapi plugin dir.
          mkdir -p /stage/usr/include/krb5 /stage/usr/include/gssapi \
                   /stage/usr/include/gssrpc /stage/usr/lib/krb5 \
                   "$SYSROOT/usr/include/krb5" "$SYSROOT/usr/include/gssapi" \
                   "$SYSROOT/usr/include/gssrpc" "$SYSROOT/usr/lib/krb5" \
                   /usr/include/krb5 /usr/include/gssapi /usr/include/gssrpc \
                   /usr/lib/krb5 /usr/share/et
          stage_for_build() { # $1=srcdir $2=destdir — install tools/headers there
            make -C "/usr/src/$1" install DESTDIR="$2" \
              INSTALL="install -N /usr/src/etc -U -M $2/METALOG.krbstage -D $2" \
              METALOG="$2/METALOG.krbstage" MK_MAN=no MK_INCLUDES=yes $KRBFLAGS
          }
          while IFS= read -r d; do
            echo "::group::build $d"
            FLAGS=""; INCFLAG="MK_INCLUDES=no"
            case "$d" in krb5/*) FLAGS="$KRBFLAGS" ;; esac
            case "$d" in krb5/include) INCFLAG="MK_INCLUDES=yes" ;; esac
            make -C "/usr/src/$d" obj $FLAGS
            make -C "/usr/src/$d" all $FLAGS
            make -C "/usr/src/$d" install $INCFLAG MK_MAN=no $FLAGS
            # krb5 build prerequisites -> stage to PATH/share (/) AND sysroot
            case "$d" in
              krb5/util/support|krb5/util/et|krb5/util/compile_et|krb5/util/profile|krb5/include)
                stage_for_build "$d" /
                stage_for_build "$d" "$SYSROOT"
                ;;
            esac
            echo "::endgroup::"
          done < /tmp/srclist
          # Stage the FULL FreeBSD /usr/include into the base (for nextbsd chroot
          # builds of the Apple components). Diagnose the sysroot, then copy the
          # whole tree via tar pipe (robust for symlinks/perms). The earlier
          # `cp -a` produced a partial tree (missing stdint.h/sys/types.h).
          SYSROOT_INC=/usr/obj/usr/src/${{ matrix.target }}.${{ matrix.target_arch }}/tmp/usr/include
          echo "=== sysroot include diag ==="
          ls -la "$SYSROOT_INC/stdint.h" "$SYSROOT_INC/sys/types.h" 2>&1 | head
          echo "    sysroot include entry count: $(find "$SYSROOT_INC" -type f 2>/dev/null | wc -l)"
          # The sysroot headers are SYMLINKS into the source tree (make _includes
          # symlink optimization). Dereference with cp -L so /stage gets REAL
          # header files (tar isn't in buildenv's PATH; cp is).
          cp -RLp "$SYSROOT_INC/." /stage/usr/include/
          echo "=== staged /stage/usr/include check ==="
          ls -la /stage/usr/include/stdint.h /stage/usr/include/sys/types.h 2>&1 | head
          echo "    staged include entry count: $(find /stage/usr/include -type f | wc -l)"
          EOS
          chmod +x /tmp/curated.sh
          ./tools/build/make.py --cross-bindir="${CCACHE_CROSS_BINDIR}" \
            TARGET=${{ matrix.target }} TARGET_ARCH=${{ matrix.target_arch }} ${WORLD_FLAGS} \
            buildenv BUILDENV_SHELL=/tmp/curated.sh

      - name: Inspect /stage
        run: |
          echo "=== /stage tree ==="; find /stage -maxdepth 3 | head -60
          echo "=== libc present? ==="; ls -l /stage/lib/libc.so* /stage/libexec/ld-elf.so.1 2>&1 || true

      - name: Pack base artifact
        run: |
          rm -f /stage/METALOG   # staging manifest byproduct, not part of base
          # HARD GUARD: nextbsd owns these on the ISO — strip them even if a
          # tool's Makefile tried to install a config/runtime file.
          # NB: /boot is now KEPT (stand/ installs the loader there). nextbsd
          # still owns /boot/kernel (kernel + modules + mach.ko) and the
          # loader.conf.d overlay, so strip just /boot/kernel from the artifact.
          rm -rf /stage/etc /stage/var /stage/root /stage/.profile /stage/.cshrc
          rm -rf /stage/boot/kernel
          echo "=== final base tree (top levels) ==="; find /stage -maxdepth 2 -type d | sort
          tar -C /stage -czf /tmp/nextbsd-base-${{ matrix.target }}.tar.gz .

      - name: Upload base artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextbsd-base-${{ matrix.target }}
          path: /tmp/nextbsd-base-${{ matrix.target }}.tar.gz

  # Refresh the rolling `continuous` release from a successful main build and
  # then cascade to the nextbsd ISO — in that order, so the ISO ingests this
  # run's base, not the prior one. Single non-matrix job (collects both arches,
  # publishes once — no release-creation race). PRs build but never reach here.
  # End-to-end chain: releng/15.0 -> toolchain -> compat -> nextbsd.
  publish:
    name: publish continuous
    needs: base
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect per-arch assets
        run: |
          mkdir -p out
          # The base artifacts are already tarballs (nextbsd-base-<arch>.tar.gz)
          # — just gather them; no repackaging needed.
          find artifacts -name 'nextbsd-base-*.tar.gz' -exec cp {} out/ \;
          ls -lh out/

      # Stable asset names → each publish overwrites in place; no stale pileup.
      - name: Publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous base build
          body: |
            Rolling from-source base (the fbsdglue set), refreshed on every
            successful `main` build. Consumed by nextbsd
            (`nextbsd-base-<arch>.tar.gz`).

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            out/*.tar.gz

      # Cascade to the nextbsd ISO only on a real upstream change
      # (repository_dispatch, i.e. the releng->toolchain->compat chain), and
      # only after continuous is refreshed above. A manual/patch main build
      # refreshes continuous but does NOT kick the ISO — matches how the kernel
      # repo gates its modules cascade.
      - name: Trigger downstream nextbsd ISO build
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api repos/nextbsd-redux/nextbsd/dispatches \
            -f event_type=base-updated \
            -f "client_payload[fbsd_sha]=${{ github.event.client_payload.fbsd_sha || inputs.fbsd_sha }}"
